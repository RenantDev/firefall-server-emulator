services:
  # === Firefall API Server (clientapi_host) ===
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgres://firefall:firefall@db:5432/firefall
      REDIS_URL: redis://redis:6379
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      MATRIX_HOST: "0.0.0.0"
      MATRIX_PORT: "25000"
      PUBLIC_MATRIX_HOST: "${PUBLIC_MATRIX_HOST:-127.0.0.1}"
      PUBLIC_API_HOST: "${PUBLIC_API_HOST:-http://127.0.0.1:8080}"
      PUBLIC_FRONTEND_HOST: "${PUBLIC_FRONTEND_HOST:-http://127.0.0.1:8080}"
      RUST_LOG: "firefall_server=debug,tower_http=debug"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - firefall

  # === PostgreSQL Database ===
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: firefall
      POSTGRES_PASSWORD: firefall
      POSTGRES_DB: firefall
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firefall"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - firefall

  # === Redis Cache ===
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - firefall

volumes:
  pgdata:
  redisdata:

networks:
  firefall:
    driver: bridge
